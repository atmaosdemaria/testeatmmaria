<!DOCTYPE html>
<html lang="pt-br">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel Admin</title>

</head>

<body>

<div class="admin-container">

<div id="lista-produtos"></div>

<script src="js/cms.js"></script>
